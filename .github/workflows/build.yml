name: Build Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: write
# 一个workflow由执行的一项或多项job
jobs:
  # 一个job任务，任务名为build
  build:
    # runs-on 指定job任务运行所需要的虚拟机环境(必填字段)
    runs-on: ubuntu-latest
    # steps是每个Job的运行步骤，可以包含一个或多个步骤
    steps:
      # action命令，切换分支获取源码
      - name: Checkout
      # 使用action库  actions/checkout获取源码
        uses: actions/checkout@v4
      - name: use Node.js 20
         # 使用action库  actions/setup-node安装node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Script
      # 先给当前文件夹所有文件添加可执行权限,执行frida-compile脚本，编译脚本
        run: |
          git clone https://github.com/bcmdy/JsHook-Scropt-Template Script.tmp
          chmod +x -R ./Script.tmp
          cd ./Script.tmp
          npm run build
      - name: 🧧 Create GitHub Release => (${{ github.run_number }})
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.script_name }}_${{ github.run_number }}
          files: "${{ github.workspace }}/Script.tmp/dist/build.js"
          generate_release_notes: true
